name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check tools/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check tools/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=reports/junit.xml \
            --cov=tools --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/
          retention-days: 30

  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          files=(
            "README.md"
            "CLAUDE.md"
            "LICENSE"
            "CONTRIBUTING.md"
            "pyproject.toml"
            ".gitignore"
            "missions/templates/mission_template.md"
            "missions/templates/implementation_contract.md"
            "missions/templates/test_plan_template.md"
            "playbooks/build_failure.md"
            "playbooks/guru_meditation.md"
            "playbooks/wifi_debug.md"
            "playbooks/i2c_bringup.md"
            "playbooks/watchdog_reset.md"
            "playbooks/memory_review.md"
            "tools/validate_mission.py"
            "tools/generate_contract.py"
            "tools/summarize_logs.py"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "  MISSING: $f"
              missing=$((missing + 1))
            else
              echo "  OK: $f"
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "ERROR: $missing required file(s) missing"
            exit 1
          fi
          echo "All required files present."

      - name: Check skill directories
        run: |
          echo "Checking skill directories..."
          skills=(
            "repo_scout"
            "feature_contract"
            "esp32_pin_audit"
            "esp32_arch_review"
            "esp32_test_plan"
            "esp32_log_triage"
            "esp32_crash_review"
            "pr_prepare"
          )
          missing=0
          for s in "${skills[@]}"; do
            if [ ! -f ".claude/skills/$s/SKILL.md" ]; then
              echo "  MISSING: .claude/skills/$s/SKILL.md"
              missing=$((missing + 1))
            else
              echo "  OK: .claude/skills/$s/SKILL.md"
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "ERROR: $missing skill file(s) missing"
            exit 1
          fi
          echo "All skill files present."
