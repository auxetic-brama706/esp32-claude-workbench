name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude:
    name: Claude Code Review
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.comment.body, '/claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests for context
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=reports/junit.xml || true

      - name: Provide context to Claude
        run: |
          echo "## Repository Context"
          echo ""
          echo "### Test Results"
          if [ -f reports/junit.xml ]; then
            echo "Test report available at reports/junit.xml"
          fi
          echo ""
          echo "### CLAUDE.md Rules"
          cat CLAUDE.md
          echo ""
          echo "### Available Skills"
          ls -1 .claude/skills/
          echo ""
          echo "### Available Playbooks"
          ls -1 playbooks/
